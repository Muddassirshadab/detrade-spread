<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trade Executor</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>

<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-text">⚡ DeTrade Executor</span>
      </div>
    </header>

    <!-- Server Config -->
    <div class="card">
      <div class="card-header">
        <span>⚙️ Server Config</span>
      </div>
      <div class="config-row">
        <label class="label">EVENT STREAM URL</label>
        <input type="text" class="server-input" id="serverUrl" value="http://localhost:3000/events"
          placeholder="http://localhost:3000/events" spellcheck="false">
      </div>
    </div>

    <!-- Control Buttons -->
    <div class="controls-section">
      <div class="main-buttons">
        <button class="ctrl-btn start-btn" id="startBtn">
          <span class="btn-icon">▶</span>
          <span>START</span>
        </button>
        <button class="ctrl-btn stop-btn" id="stopBtn" disabled>
          <span class="btn-icon">■</span>
          <span>STOP</span>
        </button>
      </div>

      <!-- Reverse Toggle -->
      <div class="reverse-section">
        <div class="reverse-info">
          <span class="reverse-icon">🔄</span>
          <div>
            <span class="reverse-title">Reverse Mode</span>
            <span class="reverse-desc">UP→DOWN, DOWN→UP</span>
          </div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="reverseToggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-section">
      <div class="stat-item">
        <span class="stat-value" id="connectedClients">0</span>
        <span class="stat-label">Clients</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="tradesExecuted">0</span>
        <span class="stat-label">Trades</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="lastDirection">--</span>
        <span class="stat-label">Last Trade</span>
      </div>
    </div>

    <!-- Trade Log -->
    <div class="log-section">
      <div class="log-header">
        <span class="log-title">📝 Trade Log</span>
        <button class="clear-log-btn" id="clearLogBtn">Clear</button>
      </div>
      <div class="log-container" id="logContainer">
        <div class="log-entry info">Waiting to start...</div>
      </div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>

</html>
