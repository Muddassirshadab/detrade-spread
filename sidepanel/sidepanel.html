<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeTrade Bot</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>

<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">📈</span>
        <span class="logo-text">DeTrade Bot</span>
      </div>
      <div class="connection-status" id="connectionStatus">
        <span class="status-dot disconnected"></span>
        <span class="status-text">Disconnected</span>
      </div>
    </header>

    <!-- Price Display -->
    <div class="price-section">
      <div class="symbol-info">
        <span class="symbol-name" id="symbolName">STONKS/USDT</span>
        <span class="timeframe-badge" id="currentTimeframe">15s</span>
      </div>
      <div class="price-display">
        <span class="current-price" id="currentPrice">---.--</span>
        <span class="price-change positive" id="priceChange">+0.00%</span>
      </div>
    </div>

    <!-- Chart Container -->
    <div class="chart-section">
      <div class="chart-header">
        <div class="timeframe-buttons">
          <button class="tf-btn" data-tf="5s">5s</button>
          <button class="tf-btn active" data-tf="15s">15s</button>
          <button class="tf-btn" data-tf="30s">30s</button>
          <button class="tf-btn" data-tf="1m">1m</button>
          <button class="tf-btn" data-tf="5m">5m</button>
        </div>
      </div>
      <div class="chart-container" id="chartContainer"></div>
    </div>

    <!-- Strategy Info -->
    <div class="strategy-section">
      <div class="strategy-header">
        <span class="strategy-title">📊 EMA Strategy</span>
        <span class="ema-value" id="emaValue">EMA(50): ---.--</span>
      </div>
      <div class="signal-display">
        <span class="signal-label">Signal:</span>
        <span class="signal-value" id="currentSignal">WAITING</span>
      </div>
    </div>

    <!-- Position Info -->
    <div class="position-section" id="positionSection">
      <div class="position-header">
        <span class="position-title">📍 Current Position</span>
      </div>
      <div class="position-details" id="positionDetails">
        <div class="position-row">
          <span class="pos-label">Type:</span>
          <span class="pos-value" id="positionType">NONE</span>
        </div>
        <div class="position-row">
          <span class="pos-label">Entry:</span>
          <span class="pos-value" id="entryPrice">---.--</span>
        </div>
        <div class="position-row">
          <span class="pos-label">P&L:</span>
          <span class="pos-value pnl" id="currentPnl">$0.00</span>
        </div>
      </div>
    </div>

    <!-- Trading Buttons -->
    <div class="trading-section">
      <div class="trading-buttons">
        <button class="trade-btn buy-btn" id="buyBtn">
          <span class="btn-icon">▲</span>
          <span class="btn-text">BUY</span>
        </button>
        <button class="trade-btn sell-btn" id="sellBtn">
          <span class="btn-icon">▼</span>
          <span class="btn-text">SELL</span>
        </button>
      </div>
      <button class="close-btn" id="closeBtn">
        <span class="btn-icon">✕</span>
        <span class="btn-text">CLOSE</span>
      </button>
    </div>

    <!-- Bot Agent Section -->
    <div class="bot-section">
      <div class="bot-header">
        <span class="bot-title">🤖 Bot Agent</span>
        <label class="toggle-switch">
          <input type="checkbox" id="botToggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="bot-status">
        <span class="bot-status-text" id="botStatus">Bot is OFF</span>
        <span class="capital-display" style="float: right; font-size: 12px; color: #aaa;">
          Capital: <span id="currentCapital" style="color: #fff; font-weight: bold;">---</span>
        </span>
      </div>
      <div class="bot-stats">
        <div class="stat-item">
          <span class="stat-label">Trades</span>
          <span class="stat-value" id="totalTrades">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Win Rate</span>
          <span class="stat-value" id="winRate">0%</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Total P&L</span>
          <span class="stat-value" id="totalPnl">$0.00</span>
        </div>
      </div>
    </div>

    <!-- Trade Log -->
    <div class="log-section">
      <div class="log-header">
        <span class="log-title">📝 Trade Log</span>
        <button class="clear-log-btn" id="clearLogBtn">Clear</button>
      </div>
      <div class="log-container" id="logContainer">
        <div class="log-entry info">Waiting for connection...</div>
      </div>
    </div>
  </div>

  <script src="../lib/lightweight-charts.standalone.production.min.js"></script>
  <script src="strategy.js"></script>
  <script src="sidepanel.js"></script>
</body>

</html>
